<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal Belajar</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{font-family:'Poppins',sans-serif;margin:0;background:linear-gradient(135deg,#4facfe,#00f2fe)}
.container{text-align:center;padding:30px;color:white}
.logo{width:140px}

button{padding:14px;margin:10px auto;border:none;border-radius:15px;width:90%;display:block;font-weight:600}
.save-btn{background:#2ecc71;color:white}

input{width:90%;padding:14px;margin:10px auto;border-radius:15px;border:none}

.popup{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);display:flex;justify-content:center;align-items:center}
.popup-content{background:white;padding:25px;border-radius:20px;width:90%;max-width:400px;text-align:center}
.hidden{display:none}

/* avatar */
.avatar-item{cursor:pointer;text-align:center;position:relative}
.avatar-item img{width:80px;height:80px;border-radius:50%;border:3px solid #4facfe}
.avatar-item span{position:absolute;top:0;right:5px;background:#2ecc71;color:white;border-radius:50%;width:22px;height:22px;display:none;align-items:center;justify-content:center}
.avatar-item.active img{border:4px solid #2ecc71;transform:scale(1.1)}
.avatar-item.active span{display:flex}

/* loading */
.spinner{border:4px solid #eee;border-top:4px solid #2ecc71;border-radius:50%;width:20px;height:20px;animation:spin 1s linear infinite;margin:auto}
@keyframes spin{100%{transform:rotate(360deg)}}

/* success */
.success{font-size:40px;color:#2ecc71;animation:pop .5s}
@keyframes pop{0%{transform:scale(0)}100%{transform:scale(1)}}
</style>
</head>

<body>

<div id="home" class="container">
  <img src="SiTeek.png" class="logo">
  <h2>Portal Belajar</h2>
  <button onclick="showLogin()">Login</button>
  <button onclick="resetApp()" style="background:red;color:white;">Reset</button>
</div>

<!-- AVATAR -->
<div id="avatarPopup" class="popup hidden">
<div class="popup-content">
<h3>Pilih Avatar</h3>
<div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center">
<div class="avatar-item" onclick="selectAvatar(this,'avatar1.png')"><img src="https://sugeng1104.github.io/portalbelajarranu1/avatar1.png"><span>✔</span></div>
<div class="avatar-item" onclick="selectAvatar(this,'avatar2.png')"><img src="https://sugeng1104.github.io/portalbelajarranu1/avatar2.png"><span>✔</span></div>
<div class="avatar-item" onclick="selectAvatar(this,'avatar3.png')"><img src="https://sugeng1104.github.io/portalbelajarranu1/avatar3.png"><span>✔</span></div>
<div class="avatar-item" onclick="selectAvatar(this,'avatar4.png')"><img src="https://sugeng1104.github.io/portalbelajarranu1/avatar4.png"><span>✔</span></div>
</div>
</div>
</div>

<!-- JENJANG -->
<div id="jenjangPopup" class="popup hidden">
<div class="popup-content">
<button onclick="nextKelas('PAUD')">PAUD</button>
<button onclick="nextKelas('SD')">SD</button>
</div>
</div>

<!-- KELAS -->
<div id="kelasPopup" class="popup hidden">
<div class="popup-content">
<div id="kelasList"></div>
</div>
</div>

<!-- REGISTER -->
<div id="registerForm" class="popup hidden">
<div class="popup-content">
<h3>Buat Akun</h3>
<input id="regUser" placeholder="Username">
<input id="regPass" type="password" placeholder="Password">
<button id="saveBtn" class="save-btn" onclick="register()">Simpan</button>
<div id="statusArea"></div>
</div>
</div>

<!-- LOGIN -->
<div id="loginPopup" class="popup hidden">
<div class="popup-content">
<input id="loginUser" placeholder="Username">
<input id="loginPass" type="password">
<button onclick="login()">Masuk</button>
</div>
</div>

<script>
const API_URL="https://script.google.com/macros/s/AKfycbzLtnh1t_KgrNO9CABPGQv5D67LhR4joPD2BnHXr4EoyVL6cnZgiWnI99NN1h8lnQ-Yuw/exec";

let dataUser={avatar:'',jenjang:'',kelas:''};

// ===== INIT =====
window.onload=()=>{
 showAwal();
}

function showAwal(){
 hideAll();
 document.getElementById('avatarPopup').classList.remove('hidden');
}

function hideAll(){
 document.querySelectorAll('.popup').forEach(p=>p.classList.add('hidden'));
}

// ===== AVATAR =====
function selectAvatar(el,av){
 document.querySelectorAll('.avatar-item').forEach(e=>e.classList.remove('active'));
 el.classList.add('active');
 dataUser.avatar=av;
 setTimeout(()=>nextJenjang(),300);
}

function nextJenjang(){
 hideAll();
 document.getElementById('jenjangPopup').classList.remove('hidden');
}

// ===== KELAS =====
function nextKelas(j){
 dataUser.jenjang=j;
 hideAll();

 let list=document.getElementById('kelasList');
 list.innerHTML='';

 (j==='PAUD'?['A','B']:[1,2,3,4,5,6]).forEach(k=>{
   let b=document.createElement('button');
   b.innerText=k;
   b.onclick=()=>{
     dataUser.kelas=k;
     hideAll();
     document.getElementById('registerForm').classList.remove('hidden');
   };
   list.appendChild(b);
 });

 document.getElementById('kelasPopup').classList.remove('hidden');
}

// ===== REGISTER =====
async function register(){
 let btn=document.getElementById('saveBtn');
 let status=document.getElementById('statusArea');

 let u=document.getElementById('regUser').value.trim();
 let p=document.getElementById('regPass').value.trim();

 if(!u||!p){alert('Isi data');return;}

 btn.innerHTML='<div class=\"spinner\"></div>';
 btn.disabled=true;

 try{
   let res=await fetch(API_URL,{
     method:'POST',
     headers:{\"Content-Type\":\"application/json\"},
     body:JSON.stringify({action:'register',user:u,pass:p,avatar:dataUser.avatar,jenjang:dataUser.jenjang,kelas:dataUser.kelas})
   });

   let text=await res.text();
   let data=JSON.parse(text);

   if(data.status==='exist'){
     alert('Username sudah ada');
     resetBtn(); return;
   }

   status.innerHTML='<div class=\"success\">✔</div><p>Berhasil</p>';
   setTimeout(()=>location.reload(),1500);

 }catch(e){
   alert('Error koneksi / Apps Script belum aktif');
   resetBtn();
 }

 function resetBtn(){
   btn.innerHTML='Simpan';
   btn.disabled=false;
 }
}

// ===== LOGIN =====
function showLogin(){
 hideAll();
 document.getElementById('loginPopup').classList.remove('hidden');
}

async function login(){
 let u=document.getElementById('loginUser').value;
 let p=document.getElementById('loginPass').value;

 let res=await fetch(API_URL,{
   method:'POST',
   body:JSON.stringify({action:'login',user:u,pass:p})
 });

 let data=await res.json();

 if(data.status==='success'){
   alert('Login berhasil');
 }else{
   alert('Login gagal');
 }
}

// ===== RESET =====
function resetApp(){
 localStorage.clear();
 location.reload();
}
</script>

</body>
</html>
