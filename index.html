<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal Belajar</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{font-family:'Poppins',sans-serif;margin:0;background:linear-gradient(135deg,#4facfe,#00f2fe)}
.container{text-align:center;padding:30px 15px;color:white}
.logo{width:140px}
button{padding:14px;margin:10px auto;border:none;border-radius:15px;background:#fff;color:#3498db;font-weight:600;width:90%;display:block}
input{width:90%;padding:14px;margin:10px auto;border-radius:15px;border:none;display:block}
.popup{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);display:flex;justify-content:center;align-items:center}
.popup-content{background:white;padding:25px;border-radius:20px;width:90%;max-width:400px;text-align:center}
.hidden{display:none}

/* tombol simpan */
.save-btn{background:#2ecc71;color:white}

/* loading */
.loading{pointer-events:none;opacity:0.7}
.spinner{
 border:4px solid #f3f3f3;
 border-top:4px solid #2ecc71;
 border-radius:50%;
 width:20px;height:20px;
 animation:spin 1s linear infinite;
 margin:auto;
}
@keyframes spin{100%{transform:rotate(360deg)}}

/* sukses */
.success{
 font-size:40px;
 color:#2ecc71;
 animation:pop 0.5s ease;
}
@keyframes pop{0%{transform:scale(0)}100%{transform:scale(1)}}

.avatar-item{text-align:center;cursor:pointer;position:relative}
.avatar-item img{width:80px;height:80px;border-radius:50%;border:3px solid #4facfe}
.avatar-item span{position:absolute;top:0;right:5px;background:#2ecc71;color:white;border-radius:50%;width:22px;height:22px;display:none;align-items:center;justify-content:center}
.avatar-item.active img{border:4px solid #2ecc71;transform:scale(1.1)}
.avatar-item.active span{display:flex}
.avatar-item p{font-size:12px}

.dashboard{display:none;text-align:center;padding:20px;color:white}
.avatar-img{width:100px;height:100px;border-radius:50%;border:4px solid white}
.card{background:white;color:#333;padding:15px;margin:15px;border-radius:15px}
</style>
</head>
<body>

<div id="dashboard" class="dashboard">
  <img id="userAvatar" class="avatar-img">
  <h2 id="userName"></h2>
  <p id="userInfo"></p>
  <div class="card">
    <button onclick="goSite()">Masuk Materi</button>
    <button onclick="logout()">Logout</button>
  </div>
</div>

<div id="home" class="container">
  <img src="SiTeek.png" class="logo">
  <h2>Portal Belajar</h2>
  <button onclick="showLogin()">Login</button>
</div>

<div id="avatarPopup" class="popup hidden">
<div class="popup-content">
<h3>Pilih Avatar</h3>
<div style="display:flex;gap:15px;flex-wrap:wrap;justify-content:center">
<div class="avatar-item" onclick="selectAvatar(this,'avatar1.png')"><img src="https://sugeng1104.github.io/portalbelajarranu1/avatar1.png"><span>✔</span><p>1</p></div>
<div class="avatar-item" onclick="selectAvatar(this,'avatar2.png')"><img src="https://sugeng1104.github.io/portalbelajarranu1/avatar2.png"><span>✔</span><p>2</p></div>
<div class="avatar-item" onclick="selectAvatar(this,'avatar3.png')"><img src="https://sugeng1104.github.io/portalbelajarranu1/avatar3.png"><span>✔</span><p>3</p></div>
<div class="avatar-item" onclick="selectAvatar(this,'avatar4.png')"><img src="https://sugeng1104.github.io/portalbelajarranu1/avatar4.png"><span>✔</span><p>4</p></div>
</div>
</div>
</div>

<div id="jenjangPopup" class="popup hidden"><div class="popup-content">
<button onclick="nextKelas('PAUD')">PAUD</button>
<button onclick="nextKelas('SD')">SD</button>
</div></div>

<div id="kelasPopup" class="popup hidden"><div class="popup-content"><div id="kelasList"></div></div></div>

<div id="registerForm" class="popup hidden">
<div class="popup-content">
<h3>Buat Akun</h3>
<input id="regUser" placeholder="Username">
<input id="regPass" type="password" placeholder="Password">
<button id="saveBtn" class="save-btn" onclick="register()">Simpan</button>
<div id="statusArea"></div>
</div></div>

<div id="loginPopup" class="popup hidden"><div class="popup-content">
<input id="loginUser" placeholder="Username">
<input id="loginPass" type="password">
<button onclick="login()">Masuk</button>
</div></div>

<script>
const API_URL="https://script.google.com/macros/s/AKfycbzLtnh1t_KgrNO9CABPGQv5D67LhR4joPD2BnHXr4EoyVL6cnZgiWnI99NN1h8lnQ-Yuw/exec";
const BASE_AVATAR="https://sugeng1104.github.io/portalbelajarranu1/";

let dataUser={avatar:'',jenjang:'',kelas:''};

window.onload=()=>{
 if(localStorage.getItem('login')==='true') loadDashboard();
 else document.getElementById('avatarPopup').classList.remove('hidden');
}

function selectAvatar(el,av){
 document.querySelectorAll('.avatar-item').forEach(e=>e.classList.remove('active'));
 el.classList.add('active');
 dataUser.avatar=av;
 setTimeout(()=>nextJenjang(av),300);
}

function nextJenjang(){
 document.getElementById('avatarPopup').classList.add('hidden');
 document.getElementById('jenjangPopup').classList.remove('hidden');
}

function nextKelas(j){
 dataUser.jenjang=j;
 document.getElementById('jenjangPopup').classList.add('hidden');
 let list=document.getElementById('kelasList');
 list.innerHTML='';
 (j==='PAUD'?['A','B']:[1,2,3,4,5,6]).forEach(k=>{
 let b=document.createElement('button');
 b.innerText=k;
 b.onclick=()=>{dataUser.kelas=k;document.getElementById('kelasPopup').classList.add('hidden');document.getElementById('registerForm').classList.remove('hidden');};
 list.appendChild(b);
 });
 document.getElementById('kelasPopup').classList.remove('hidden');
}

async function register(){
 let btn=document.getElementById('saveBtn');
 let status=document.getElementById('statusArea');
 let u=document.getElementById('regUser').value.trim();
 let p=document.getElementById('regPass').value.trim();

 if(!u||!p){alert('Isi data');return}

 btn.classList.add('loading');
 btn.innerHTML='<div class="spinner"></div>';

 try{
 let res=await fetch(API_URL,{method:'POST',body:JSON.stringify({action:'register',user:u,pass:p,avatar:dataUser.avatar,jenjang:dataUser.jenjang,kelas:dataUser.kelas})});
 
 // CEK RESPONSE AMAN
 let text = await res.text();
 let data;
 try{
   data = JSON.parse(text);
 }catch{
   throw new Error('Response bukan JSON: '+text);
 }

 if(data.status==='exist'){
  resetBtn();
  alert('Username sudah ada');
  return;
 }

 if(data.status==='success'){
  showSuccess();
 }else{
  throw new Error('Status tidak dikenali');
 }

 }catch(e){
  console.error(e);
  alert('Terjadi error koneksi / Apps Script belum benar');
  resetBtn();
 }
}

function resetBtn(){
 let btn=document.getElementById('saveBtn');
 btn.innerHTML='Simpan';
 btn.classList.remove('loading');
}

function showSuccess(){
 let status=document.getElementById('statusArea');
 
 // SUARA SUKSES
 let audio = new Audio('https://cdn.pixabay.com/download/audio/2022/03/15/audio_115b9b1d0f.mp3?filename=success-1-6297.mp3');
 audio.play();

 // ANIMASI
 status.innerHTML=`
   <div class="success">✔</div>
   <p style="color:#2ecc71;font-weight:bold">Akun Berhasil Dibuat</p>
   <div class="confetti"></div>
 `;

 // CONFETTI SEDERHANA
 for(let i=0;i<20;i++){
   let c=document.createElement('div');
   c.className='confetti-piece';
   c.style.left=Math.random()*100+'%';
   c.style.background=`hsl(${Math.random()*360},70%,60%)`;
   c.style.animationDuration=(Math.random()*2+1)+'s';
   status.appendChild(c);
 }

 setTimeout(()=>location.reload(),2000);
}

 btn.classList.add('loading');
 btn.innerHTML='<div class="spinner"></div>';

 try{
 let res=await fetch(API_URL,{method:'POST',body:JSON.stringify({action:'register',user:u,pass:p,avatar:dataUser.avatar,jenjang:dataUser.jenjang,kelas:dataUser.kelas})});
 let data=await res.json();

 if(data.status==='exist'){
  btn.innerHTML='Simpan';
  btn.classList.remove('loading');
  alert('Username sudah ada');
  return;
 }

 status.innerHTML='<div class="success">✔</div><p>Berhasil</p>';
 setTimeout(()=>location.reload(),1500);

 }catch(e){
  alert('Error');
  btn.innerHTML='Simpan';
  btn.classList.remove('loading');
 }
}

function showLogin(){document.getElementById('loginPopup').classList.remove('hidden')}

async function login(){
 let u=document.getElementById('loginUser').value;
 let p=document.getElementById('loginPass').value;
 let res=await fetch(API_URL,{method:'POST',body:JSON.stringify({action:'login',user:u,pass:p})});
 let data=await res.json();
 if(data.status==='success'){localStorage.setItem('login','true');localStorage.setItem('user',u);loadDashboard();}
 else alert('Gagal');
}

async function loadDashboard(){
 document.getElementById('home').style.display='none';
 document.getElementById('dashboard').style.display='block';
 let user=localStorage.getItem('user');
 let res=await fetch(API_URL,{method:'POST',body:JSON.stringify({action:'getUser',user:user})});
 let data=await res.json();
 document.getElementById('userName').innerText=user;
 document.getElementById('userInfo').innerText=data.jenjang+' - '+data.kelas;
 document.getElementById('userAvatar').src=BASE_AVATAR+data.avatar;
}

function goSite(){window.location.href='https://sites.google.com'}
function logout(){localStorage.clear();location.reload()}
</script>

</body>
</html>
