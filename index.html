<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal Belajar</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{font-family:'Poppins',sans-serif;margin:0;background:linear-gradient(135deg,#4facfe,#00f2fe)}
.container{text-align:center;padding:30px;color:white}
.logo{width:140px}

/* BUTTON */
button{
 padding:14px;
 margin:10px auto;
 border:none;
 border-radius:12px;
 width:260px;
 display:block;
 font-weight:600;
 cursor:pointer;
 transition:0.2s;
}
.btn-login{background:#ff8c00;color:white;}
.btn-masuk{background:#3498db;color:white;}
.btn-go{background:#006400;color:white;}
.logout-btn{
 background:red;color:white;
 padding:8px 12px;
 border-radius:10px;
 cursor:pointer;
}
button:active{
 transform:scale(0.95);
 box-shadow:inset 0 3px 5px rgba(0,0,0,0.3);
}

input{
 width:260px;
 padding:14px;
 margin:10px auto;
 border-radius:12px;
 border:none;
 display:block;
}

/* LOGIN */
.login-page{display:none;text-align:center;padding:40px;color:white}
.login-avatar{
 width:100px;height:100px;border-radius:50%;
 margin:20px auto;border:4px solid white;
}

/* DASHBOARD */
.dashboard{display:none;text-align:center;color:white;position:relative}
.top-bar{
 position:absolute;top:10px;right:10px;
 display:flex;gap:10px;
}
.avatar-top{
 width:40px;height:40px;border-radius:50%;
 border:2px solid white;
}
.kelas-img{
 width:260px;
 display:block;
 margin:120px auto 20px;
}
</style>
</head>

<body>

<!-- DASHBOARD -->
<div id="dashboard" class="dashboard">
  <div class="top-bar">
    <img id="userAvatar" class="avatar-top">
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>
  <div id="kelasContent"></div>
</div>

<!-- HOME -->
<div id="home" class="container">
  <img src="SiTeek.png" class="logo">
  <h2>Portal Belajar</h2>
  <button class="btn-login" onclick="showLoginPage()">Login</button>
</div>

<!-- LOGIN -->
<div id="loginPage" class="login-page">
  <img id="loginAvatar" class="login-avatar" src="https://via.placeholder.com/100">
  <input id="loginUser" placeholder="Username" oninput="loadAvatarPreview()">
  <input id="loginPass" type="password" placeholder="Password">
  <button class="btn-masuk" onclick="login()">Masuk</button>
</div>

<script>
const API_URL="https://script.google.com/macros/s/AKfycbzLtnh1t_KgrNO9CABPGQv5D67LhR4joPD2BnHXr4EoyVL6cnZgiWnI99NN1h8lnQ-Yuw/exec";
const BASE_AVATAR="https://sugeng1104.github.io/portalbelajarranu1/";

// ================= CEK USER + DETEKSI TERHAPUS =================
window.onload=async ()=>{
  const urlParams = new URLSearchParams(window.location.search);
  const user = urlParams.get('user');

  if(user){
    let formData=new FormData();
    formData.append("action","getUser");
    formData.append("user",user);

    try{
      let res=await fetch(API_URL,{method:'POST',body:formData});
      let data=await res.json();

      if(data && data.avatar){
        loadDashboard(user);
      }else{
        resetToAwal();
      }
    }catch(e){
      resetToAwal();
    }

  }else{
    document.getElementById('home').style.display='block';
  }
}

// ================= RESET KE USER BARU =================
function resetToAwal(){
  alert("Akun tidak ditemukan, silakan daftar kembali");

  window.history.replaceState({}, document.title, "index.html");

  document.getElementById('dashboard').style.display='none';
  document.getElementById('loginPage').style.display='none';
  document.getElementById('home').style.display='block';
}

// ================= LOGIN PAGE =================
function showLoginPage(){
 document.getElementById('home').style.display='none';
 document.getElementById('loginPage').style.display='block';
}

// ================= LOAD AVATAR =================
async function loadAvatarPreview(){
 let u=document.getElementById('loginUser').value;
 if(u.length<2)return;

 let formData=new FormData();
 formData.append("action","getUser");
 formData.append("user",u);

 try{
  let res=await fetch(API_URL,{method:'POST',body:formData});
  let data=await res.json();

  if(data.avatar){
    document.getElementById('loginAvatar').src=BASE_AVATAR+data.avatar;
  }
 }catch(e){}
}

// ================= LOGIN =================
async function login(){
 let u=document.getElementById('loginUser').value;
 let p=document.getElementById('loginPass').value;

 let formData=new FormData();
 formData.append("action","login");
 formData.append("user",u);
 formData.append("pass",p);

 let res=await fetch(API_URL,{method:'POST',body:formData});
 let data=await res.json();

 if(data.status==='success'){
   window.location.href="?user="+u;
 }else{
   alert("Login gagal");
 }
}

// ================= DASHBOARD =================
async function loadDashboard(user){
 document.getElementById('home').style.display='none';
 document.getElementById('loginPage').style.display='none';
 document.getElementById('dashboard').style.display='block';

 let formData=new FormData();
 formData.append("action","getUser");
 formData.append("user",user);

 let res=await fetch(API_URL,{method:'POST',body:formData});
 let data=await res.json();

 document.getElementById('userAvatar').src=BASE_AVATAR+data.avatar;

 let kelasContent=document.getElementById('kelasContent');

 if(data.kelas==4){
   kelasContent.innerHTML=`
     <img src="https://sugeng1104.github.io/portalbelajarranu1/kelas4.png" class="kelas-img">
     <button class="btn-go" onclick="goKelas4()">GO</button>
   `;
 }else{
   kelasContent.innerHTML=`<h2>Kelas ${data.kelas}</h2>`;
 }
}

// ================= GO =================
function goKelas4(){
 window.location.href="https://sites.google.com/guru.sd.belajar.id/kelas-4-upt-sdn-ranuklindungan/halaman-muka";
}

// ================= LOGOUT =================
function logout(){
 window.location.href="index.html";
}
</script>

</body>
</html>
