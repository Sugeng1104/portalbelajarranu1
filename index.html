<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal Belajar</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{font-family:'Poppins',sans-serif;margin:0;background:linear-gradient(135deg,#4facfe,#00f2fe)}
.container{text-align:center;padding:30px 15px;color:white}
.logo{width:140px}

button{padding:14px;margin:10px auto;border:none;border-radius:15px;width:90%;display:block;font-weight:600}
button.default{background:#fff;color:#3498db}
button.save{background:#2ecc71;color:white}

input{width:90%;padding:14px;margin:10px auto;border-radius:15px;border:none}

.popup{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);display:flex;justify-content:center;align-items:center}
.popup-content{background:white;padding:25px;border-radius:20px;width:90%;max-width:400px;text-align:center}
.hidden{display:none}

/* avatar */
.avatar-item{text-align:center;cursor:pointer;position:relative}
.avatar-item img{width:80px;height:80px;border-radius:50%;border:3px solid #4facfe}
.avatar-item span{position:absolute;top:0;right:5px;background:#2ecc71;color:white;border-radius:50%;width:22px;height:22px;display:none;align-items:center;justify-content:center}
.avatar-item.active img{border:4px solid #2ecc71;transform:scale(1.1)}
.avatar-item.active span{display:flex}

/* loading */
.spinner{border:4px solid #eee;border-top:4px solid #2ecc71;border-radius:50%;width:20px;height:20px;animation:spin 1s linear infinite;margin:auto}
@keyframes spin{100%{transform:rotate(360deg)}}

/* success */
.success{font-size:40px;color:#2ecc71;animation:pop .5s}
@keyframes pop{0%{transform:scale(0)}100%{transform:scale(1)}}

/* dashboard */
.dashboard{display:none;text-align:center;padding:20px;color:white}
.avatar-img{width:100px;height:100px;border-radius:50%;border:4px solid white}
.card{background:white;color:#333;padding:15px;margin:15px;border-radius:15px}
</style>
</head>

<body>

<!-- DASHBOARD -->
<div id="dashboard" class="dashboard">
  <img id="userAvatar" class="avatar-img">
  <h2 id="userName"></h2>
  <p id="userInfo"></p>

  <div class="card">
    <button class="default" onclick="goSite()">Masuk Materi</button>
    <button class="default" onclick="logout()">Logout</button>
  </div>
</div>

<!-- HOME -->
<div id="home" class="container">
  <img src="SiTeek.png" class="logo">
  <h2>Portal Belajar</h2>
  <button class="default" onclick="showLogin()">Login</button>
</div>

<!-- AVATAR -->
<div id="avatarPopup" class="popup hidden">
<div class="popup-content">
<h3>Pilih Avatar</h3>
<div style="display:flex;justify-content:center;gap:10px;flex-wrap:wrap;">
<div class="avatar-item" onclick="selectAvatar(this,'avatar1.png')"><img src="https://sugeng1104.github.io/portalbelajarranu1/avatar1.png"><span>✔</span></div>
<div class="avatar-item" onclick="selectAvatar(this,'avatar2.png')"><img src="https://sugeng1104.github.io/portalbelajarranu1/avatar2.png"><span>✔</span></div>
<div class="avatar-item" onclick="selectAvatar(this,'avatar3.png')"><img src="https://sugeng1104.github.io/portalbelajarranu1/avatar3.png"><span>✔</span></div>
<div class="avatar-item" onclick="selectAvatar(this,'avatar4.png')"><img src="https://sugeng1104.github.io/portalbelajarranu1/avatar4.png"><span>✔</span></div>
</div>
</div>
</div>

<!-- JENJANG -->
<div id="jenjangPopup" class="popup hidden">
<div class="popup-content">
<h3>Pilih Jenjang</h3>
<button class="default" onclick="nextKelas('PAUD')">PAUD</button>
<button class="default" onclick="nextKelas('SD')">SD</button>
</div>
</div>

<!-- KELAS -->
<div id="kelasPopup" class="popup hidden">
<div class="popup-content">
<h3>Pilih Kelas</h3>
<div id="kelasList"></div>
</div>
</div>

<!-- REGISTER -->
<div id="registerForm" class="popup hidden">
<div class="popup-content">
<h3>Buat Akun</h3>
<input id="regUser" placeholder="Username">
<input id="regPass" type="password" placeholder="Password">
<button id="saveBtn" class="save" onclick="register()">Simpan</button>
<div id="statusArea"></div>
</div>
</div>

<!-- LOGIN -->
<div id="loginPopup" class="popup hidden">
<div class="popup-content">
<h3>Login</h3>
<input id="loginUser" placeholder="Username">
<input id="loginPass" type="password">
<button class="default" onclick="login()">Masuk</button>
</div>
</div>

<script>
const API_URL="https://script.google.com/macros/s/AKfycbzLtnh1t_KgrNO9CABPGQv5D67LhR4joPD2BnHXr4EoyVL6cnZgiWnI99NN1h8lnQ-Yuw/exec";
const BASE_AVATAR="https://sugeng1104.github.io/portalbelajarranu1/";

let dataUser={avatar:'',jenjang:'',kelas:''};

/* ================= AWAL ================= */
window.onload=()=>{
 if(localStorage.getItem('login')==='true'){
   loadDashboard();
 }else if(localStorage.getItem('sudahDaftar')==='true'){
   hideAll(); // tidak tampil popup
 }else{
   showAwal(); // pertama kali tampil popup
 }
};

function showAwal(){
 hideAll();
 document.getElementById('avatarPopup').classList.remove('hidden');
}

function hideAll(){
 document.querySelectorAll('.popup').forEach(p=>p.classList.add('hidden'));
}

/* ================= PILIH ================= */
function selectAvatar(el,av){
 document.querySelectorAll('.avatar-item').forEach(e=>e.classList.remove('active'));
 el.classList.add('active');
 dataUser.avatar=av;
 setTimeout(()=>nextJenjang(),300);
}

function nextJenjang(){
 hideAll();
 document.getElementById('jenjangPopup').classList.remove('hidden');
}

function nextKelas(j){
 dataUser.jenjang=j;
 hideAll();
 let list=document.getElementById('kelasList');
 list.innerHTML='';
 (j==='PAUD'?['A','B']:[1,2,3,4,5,6]).forEach(k=>{
  let b=document.createElement('button');
  b.innerText=k;
  b.className="default";
  b.onclick=()=>{
    dataUser.kelas=k;
    hideAll();
    document.getElementById('registerForm').classList.remove('hidden');
  };
  list.appendChild(b);
 });
 document.getElementById('kelasPopup').classList.remove('hidden');
}

/* ================= REGISTER ================= */
async function register(){
 let btn=document.getElementById('saveBtn');
 let status=document.getElementById('statusArea');
 let u=document.getElementById('regUser').value.trim();
 let p=document.getElementById('regPass').value.trim();

 if(!u||!p){alert('Isi username dan password');return;}

 btn.innerHTML='<div class="spinner"></div>';
 btn.disabled=true;

 try{
  let formData=new FormData();
  formData.append("action","register");
  formData.append("user",u);
  formData.append("pass",p);
  formData.append("avatar",dataUser.avatar);
  formData.append("jenjang",dataUser.jenjang);
  formData.append("kelas",dataUser.kelas);

  let res=await fetch(API_URL,{method:'POST',body:formData});
  let data=await res.json();

  if(data.status==='exist'){
    alert('Username sudah ada');
    reset(); return;
  }

  /* 🔥 SIMPAN STATUS SUDAH DAFTAR */
  localStorage.setItem('sudahDaftar','true');

  status.innerHTML='<div class="success">✔</div><p>Berhasil</p>';

  setTimeout(()=>location.reload(),1500);

 }catch(e){
  alert('Gagal koneksi');
  reset();
 }

 function reset(){
  btn.innerHTML='Simpan';
  btn.disabled=false;
 }
}

/* ================= LOGIN ================= */
function showLogin(){
 hideAll();
 document.getElementById('loginPopup').classList.remove('hidden');
}

async function login(){
 let u=document.getElementById('loginUser').value;
 let p=document.getElementById('loginPass').value;

 try{
  let formData=new FormData();
  formData.append("action","login");
  formData.append("user",u);
  formData.append("pass",p);

  let res=await fetch(API_URL,{method:'POST',body:formData});
  let data=await res.json();

  if(data.status==='success'){
   localStorage.setItem('login','true');
   localStorage.setItem('user',u);
   localStorage.setItem('sudahDaftar','true');
   loadDashboard();
  }else{
   alert('Login gagal');
  }

 }catch(e){
  alert('Error koneksi');
 }
}

/* ================= DASHBOARD ================= */
async function loadDashboard(){
 hideAll();
 document.getElementById('home').style.display='none';
 document.getElementById('dashboard').style.display='block';

 let user=localStorage.getItem('user');

 let formData=new FormData();
 formData.append("action","getUser");
 formData.append("user",user);

 let res=await fetch(API_URL,{method:'POST',body:formData});
 let data=await res.json();

 document.getElementById('userName').innerText=user;
 document.getElementById('userInfo').innerText=data.jenjang+' - Kelas '+data.kelas;
 document.getElementById('userAvatar').src=BASE_AVATAR+data.avatar;
}

/* ================= LAINNYA ================= */
function goSite(){window.location.href="https://sites.google.com";}
function logout(){localStorage.clear();location.reload();}
</script>

</body>
</html>
