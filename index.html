<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal Belajar</title>

<style>
body{margin:0;font-family:Poppins, sans-serif;background:linear-gradient(135deg,#4facfe,#00f2fe)}
.container{text-align:center;padding:30px;color:white}
.logo{width:140px}
.home-avatar{
 width:90px;height:90px;border-radius:50%;
 border:4px solid white;margin:10px auto;
 display:none;
}

/* BUTTON */
button{
 width:260px;padding:14px;margin:10px auto;
 border:none;border-radius:12px;display:block;
 cursor:pointer;font-weight:600;
}
.btn-login{background:orange;color:white}
.btn-masuk{background:#3498db;color:white}
.btn-go{background:#006400;color:white}
.logout-btn{background:red;color:white;padding:8px 12px;border-radius:10px}

/* LOGIN */
.login-page{display:none;text-align:center;padding:40px;color:white}
.login-avatar{width:100px;height:100px;border-radius:50%;margin:20px auto;border:4px solid white}

/* DASHBOARD */
.dashboard{display:none;text-align:center;color:white;position:relative}
.top-bar{position:absolute;top:10px;right:10px;display:flex;gap:10px}
.avatar-top{width:40px;height:40px;border-radius:50%;border:2px solid white}
.kelas-img{width:260px;margin:120px auto 20px}

/* POPUP */
.popup{
 position:fixed;top:0;left:0;width:100%;height:100%;
 background:rgba(0,0,0,.6);
 display:flex;justify-content:center;align-items:center;
 z-index:999;
}
.popup-content{
 background:white;padding:20px;border-radius:20px;text-align:center;
 position:relative;
}

/* ❌ CLOSE */
.close{
 position:absolute;top:10px;right:15px;
 cursor:pointer;font-size:20px;font-weight:bold;
}

/* HIDDEN */
.hidden{display:none}

/* AVATAR */
.avatar-item{display:inline-block;margin:10px;cursor:pointer;position:relative}
.avatar-item img{width:70px;height:70px;border-radius:50%;border:3px solid #ccc}
.avatar-item span{
 position:absolute;top:0;right:5px;
 background:#2ecc71;color:white;border-radius:50%;
 width:20px;height:20px;display:none;justify-content:center;align-items:center;
}
.avatar-item.active img{border:4px solid #2ecc71;transform:scale(1.1)}
.avatar-item.active span{display:flex}
</style>
</head>

<body>

<!-- DASHBOARD -->
<div id="dashboard" class="dashboard">
  <div class="top-bar">
    <img id="userAvatar" class="avatar-top">
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>
  <div id="kelasContent"></div>
</div>

<!-- HOME -->
<div id="home" class="container">
  <img src="SiTeek.png" class="logo">
  <img id="homeAvatar" class="home-avatar">
  <h2>Portal Belajar</h2>
  <button class="btn-login" onclick="showLogin()">Login</button>
</div>

<!-- LOGIN -->
<div id="loginPage" class="login-page">
  <img id="loginAvatar" class="login-avatar" src="https://via.placeholder.com/100">
  <input id="loginUser" placeholder="Username" oninput="loadAvatar()">
  <input id="loginPass" type="password" placeholder="Password">
  <button class="btn-masuk" onclick="login()">Masuk</button>
</div>

<!-- AVATAR -->
<div id="avatarPopup" class="popup hidden">
<div class="popup-content">
<div class="close" onclick="hideAll()">✖</div>
<h3>Pilih Avatar</h3>

<div class="avatar-item" onclick="selectAvatar(this,'avatar1.png')">
<img src="https://sugeng1104.github.io/portalbelajarranu1/avatar1.png"><span>✔</span></div>

<div class="avatar-item" onclick="selectAvatar(this,'avatar2.png')">
<img src="https://sugeng1104.github.io/portalbelajarranu1/avatar2.png"><span>✔</span></div>

<div class="avatar-item" onclick="selectAvatar(this,'avatar3.png')">
<img src="https://sugeng1104.github.io/portalbelajarranu1/avatar3.png"><span>✔</span></div>

<div class="avatar-item" onclick="selectAvatar(this,'avatar4.png')">
<img src="https://sugeng1104.github.io/portalbelajarranu1/avatar4.png"><span>✔</span></div>

</div>
</div>

<!-- JENJANG -->
<div id="jenjangPopup" class="popup hidden">
<div class="popup-content">
<div class="close" onclick="hideAll()">✖</div>
<h3>Pilih Jenjang</h3>
<button onclick="nextKelas('PAUD')">PAUD</button>
<button onclick="nextKelas('SD')">SD</button>
</div>
</div>

<!-- KELAS -->
<div id="kelasPopup" class="popup hidden">
<div class="popup-content">
<div class="close" onclick="hideAll()">✖</div>
<h3>Pilih Kelas</h3>
<div id="kelasList"></div>
</div>
</div>

<!-- REGISTER -->
<div id="registerPopup" class="popup hidden">
<div class="popup-content">
<div class="close" onclick="hideAll()">✖</div>
<h3>Buat Akun</h3>
<input id="regUser" placeholder="Username">
<input id="regPass" type="password" placeholder="Password">
<button class="btn-go" onclick="register()">Daftar</button>
</div>
</div>

<script>
const API="https://script.google.com/macros/s/AKfycbzLtnh1t_KgrNO9CABPGQv5D67LhR4joPD2BnHXr4EoyVL6cnZgiWnI99NN1h8lnQ-Yuw/exec";
const BASE="https://sugeng1104.github.io/portalbelajarranu1/";

let dataUser={};

// INIT
window.onload=async()=>{
 let userLocal=localStorage.getItem("user");

 if(userLocal){
  let f=new FormData();
  f.append("action","getUser");
  f.append("user",userLocal);

  let r=await fetch(API,{method:'POST',body:f});
  let d=await r.json();

  if(d && d.avatar){
    document.getElementById("homeAvatar").src=BASE+d.avatar;
    document.getElementById("homeAvatar").style.display="block";
  }else{
    showAwal();
  }
 }else{
  showAwal();
 }
}

// POPUP
function showAwal(){document.getElementById('avatarPopup').classList.remove('hidden')}
function hideAll(){document.querySelectorAll('.popup').forEach(p=>p.classList.add('hidden'))}

// FLOW
function selectAvatar(el,av){
 document.querySelectorAll('.avatar-item').forEach(e=>e.classList.remove('active'));
 el.classList.add('active');
 dataUser.avatar=av;
 setTimeout(()=>nextJenjang(),300);
}

function nextJenjang(){
 hideAll();
 document.getElementById('jenjangPopup').classList.remove('hidden');
}

function nextKelas(j){
 dataUser.jenjang=j;
 hideAll();

 let list=kelasList;
 list.innerHTML='';

 (j==='PAUD'?['A','B']:[1,2,3,4,5,6]).forEach(k=>{
  let b=document.createElement('button');
  b.innerText=k;
  b.onclick=()=>{
    dataUser.kelas=k;
    hideAll();
    registerPopup.classList.remove('hidden');
  };
  list.appendChild(b);
 });

 kelasPopup.classList.remove('hidden');
}

// REGISTER
async function register(){
 let f=new FormData();
 f.append("action","register");
 f.append("user",regUser.value);
 f.append("pass",regPass.value);
 f.append("avatar",dataUser.avatar);
 f.append("jenjang",dataUser.jenjang);
 f.append("kelas",dataUser.kelas);

 let r=await fetch(API,{method:'POST',body:f});
 let d=await r.json();

 if(d.status==='success'){
  localStorage.setItem("user", regUser.value);
  hideAll();
  location.reload();
 }
}

// LOGIN
function showLogin(){
 home.style.display='none';
 loginPage.style.display='block';
}

async function login(){
 let f=new FormData();
 f.append("action","login");
 f.append("user",loginUser.value);
 f.append("pass",loginPass.value);

 let r=await fetch(API,{method:'POST',body:f});
 let d=await r.json();

 if(d.status==='success'){
  loadDashboard(loginUser.value);
 }
}

// DASHBOARD
async function loadDashboard(user){
 home.style.display='none';
 loginPage.style.display='none';
 dashboard.style.display='block';

 let f=new FormData();
 f.append("action","getUser");
 f.append("user",user);

 let r=await fetch(API,{method:'POST',body:f});
 let d=await r.json();

 userAvatar.src=BASE+d.avatar;

 if(d.kelas==4){
  kelasContent.innerHTML=`<img src="${BASE}kelas4.png" class="kelas-img">
  <button class="btn-go" onclick="go()">GO</button>`;
 }
}

function go(){
 location.href="https://sites.google.com/guru.sd.belajar.id/kelas-4-upt-sdn-ranuklindungan/halaman-muka";
}

function logout(){
 localStorage.removeItem("user");
 location.reload();
}
</script>

</body>
</html>
