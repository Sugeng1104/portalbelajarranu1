<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal Belajar</title>

<!-- FONT -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
  font-family:'Poppins',sans-serif;
  margin:0;
  background:linear-gradient(135deg,#4facfe,#00f2fe);
}

.container{
  text-align:center;
  padding:30px 15px;
  color:white;
}

.logo{
  width:160px;
  margin-bottom:10px;
}

h2{margin:5px 0 20px}

button{
  padding:14px;
  margin:10px auto;
  border:none;
  border-radius:15px;
  background:#ffffff;
  color:#3498db;
  font-weight:600;
  width:90%;
  display:block;
  box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

button:hover{transform:scale(1.03)}

input{
  width:90%;
  padding:14px;
  margin:10px auto;
  border-radius:15px;
  border:none;
  display:block;
  box-shadow:0 3px 8px rgba(0,0,0,0.2);
}

/* POPUP MODERN */
.popup{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.6);
  display:flex;
  justify-content:center;
  align-items:center;
}

.popup-content{
  background:white;
  padding:25px 20px;
  border-radius:20px;
  width:90%;
  max-width:400px;
  text-align:center;
  animation:fadeIn 0.3s ease;
}

.popup-content h3{
  margin-bottom:15px;
}

.hidden{display:none}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(20px)}
  to{opacity:1; transform:translateY(0)}
}

</style>
</head>

<body>

<div class="container">
  <img src="SiTeek.png" class="logo">
  <h2>Portal Belajar</h2>
  <button onclick="showLogin()">Login</button>
</div>

<!-- AVATAR -->
<div id="avatarPopup" class="popup hidden">
  <div class="popup-content">
    <h3>Pilih Avatar</h3>
    <button onclick="nextJenjang('A1')">Avatar 1</button>
    <button onclick="nextJenjang('A2')">Avatar 2</button>
  </div>
</div>

<!-- JENJANG -->
<div id="jenjangPopup" class="popup hidden">
  <div class="popup-content">
    <h3>Pilih Jenjang</h3>
    <button onclick="nextKelas('PAUD')">PAUD</button>
    <button onclick="nextKelas('SD')">SD</button>
  </div>
</div>

<!-- KELAS -->
<div id="kelasPopup" class="popup hidden">
  <div class="popup-content">
    <h3>Pilih Kelas</h3>
    <div id="kelasList"></div>
  </div>
</div>

<!-- REGISTER -->
<div id="registerForm" class="popup hidden">
  <div class="popup-content">
    <h3>Buat Akun</h3>
    <input id="regUser" placeholder="Username">
    <input id="regPass" type="password" placeholder="Password">
    <button onclick="register()">Simpan</button>
  </div>
</div>

<!-- SUCCESS -->
<div id="successPopup" class="popup hidden">
  <div class="popup-content">
    <h3>✔ Akun Berhasil</h3>
    <button onclick="goLogin()">Login Sekarang</button>
  </div>
</div>

<!-- LOGIN -->
<div id="loginPopup" class="popup hidden">
  <div class="popup-content">
    <h3>Login</h3>
    <input id="loginUser" placeholder="Username">
    <input id="loginPass" type="password" placeholder="Password">
    <button onclick="login()">Masuk</button>
  </div>
</div>

<script>
const API_URL = "PASTE_URL_WEB_APP_DISINI";
const REDIRECT_URL = "https://sites.google.com";

let dataUser = {avatar:'', jenjang:'', kelas:''};

window.onload = ()=>{
 document.getElementById('avatarPopup').classList.remove('hidden');
}

function nextJenjang(av){
 dataUser.avatar = av;
 document.getElementById('avatarPopup').classList.add('hidden');
 document.getElementById('jenjangPopup').classList.remove('hidden');
}

function nextKelas(j){
 dataUser.jenjang = j;
 document.getElementById('jenjangPopup').classList.add('hidden');
 let list = document.getElementById('kelasList'); list.innerHTML='';
 let kelas = j==='PAUD' ? ['A','B'] : [1,2,3,4,5,6];

 kelas.forEach(k=>{
  let btn=document.createElement('button');
  btn.innerText=k;
  btn.onclick=()=>{
    dataUser.kelas=k;
    document.getElementById('kelasPopup').classList.add('hidden');
    document.getElementById('registerForm').classList.remove('hidden');
  };
  list.appendChild(btn);
 });

 document.getElementById('kelasPopup').classList.remove('hidden');
}

async function register(){
 let u=document.getElementById('regUser').value;
 let p=document.getElementById('regPass').value;

 if(u.length<3 || p.length<3){alert('Minimal 3 karakter');return;}

 let res = await fetch(API_URL,{method:'POST',body:JSON.stringify({action:'register',user:u,pass:p,avatar:dataUser.avatar,jenjang:dataUser.jenjang,kelas:dataUser.kelas})});
 let data = await res.json();

 if(data.status==='exist'){alert('Username sudah ada');return;}

 document.getElementById('registerForm').classList.add('hidden');
 document.getElementById('successPopup').classList.remove('hidden');
}

function goLogin(){
 document.getElementById('successPopup').classList.add('hidden');
 showLogin();
}

function showLogin(){
 document.getElementById('loginPopup').classList.remove('hidden');
}

async function login(){
 let u=document.getElementById('loginUser').value;
 let p=document.getElementById('loginPass').value;

 let res = await fetch(API_URL,{method:'POST',body:JSON.stringify({action:'login',user:u,pass:p})});
 let data = await res.json();

 if(data.status==='success'){
  localStorage.setItem('login','true');
  window.location.href=REDIRECT_URL;
 }else{
  alert('Login gagal');
 }
}
</script>

</body>
</html>
