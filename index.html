<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal Belajar</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{font-family:'Poppins',sans-serif;margin:0;background:linear-gradient(135deg,#4facfe,#00f2fe)}
.container{text-align:center;padding:30px 15px;color:white}
.logo{width:140px}
button{padding:14px;margin:10px auto;border:none;border-radius:15px;background:#fff;color:#3498db;font-weight:600;width:90%;display:block}
input{width:90%;padding:14px;margin:10px auto;border-radius:15px;border:none;display:block}
.popup{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);display:flex;justify-content:center;align-items:center}
.popup-content{background:white;padding:25px;border-radius:20px;width:90%;max-width:400px;text-align:center}
.hidden{display:none}

/* DASHBOARD */
.dashboard{
 display:none;
 text-align:center;
 padding:20px;
 color:white;
}
.avatar-img{
 width:100px;
 height:100px;
 border-radius:50%;
 border:4px solid white;
 margin-bottom:10px;
}
.card{
 background:white;
 color:#333;
 padding:15px;
 margin:15px;
 border-radius:15px;
}
</style>
</head>

<body>

<!-- DASHBOARD -->
<div id="dashboard" class="dashboard">
  <img id="userAvatar" class="avatar-img">
  <h2 id="userName"></h2>
  <p id="userInfo"></p>

  <div class="card">
    <h3>Menu Belajar</h3>
    <button onclick="goSite()">Masuk Materi</button>
    <button onclick="logout()">Logout</button>
  </div>
</div>

<!-- HALAMAN AWAL -->
<div id="home" class="container">
  <img src="SiTeek.png" class="logo">
  <h2>Portal Belajar</h2>
  <button onclick="showLogin()">Login</button>
</div>

<!-- AVATAR -->
<div id="avatarPopup" class="popup hidden">
  <div class="popup-content">
    <h3>Pilih Avatar</h3>
    <div style="display:flex;justify-content:center;gap:15px;">
      <img src="avatar/avatar1.png" width="80" onclick="nextJenjang('avatar1.png')">
      <img src="avatar/avatar2.png" width="80" onclick="nextJenjang('avatar2.png')">
    </div>
  </div>
</div>

<!-- JENJANG -->
<div id="jenjangPopup" class="popup hidden">
  <div class="popup-content">
    <h3>Pilih Jenjang</h3>
    <button onclick="nextKelas('PAUD')">PAUD</button>
    <button onclick="nextKelas('SD')">SD</button>
  </div>
</div>

<!-- KELAS -->
<div id="kelasPopup" class="popup hidden">
  <div class="popup-content">
    <h3>Pilih Kelas</h3>
    <div id="kelasList"></div>
  </div>
</div>

<!-- REGISTER -->
<div id="registerForm" class="popup hidden">
  <div class="popup-content">
    <h3>Buat Akun</h3>
    <input id="regUser" placeholder="Username">
    <input id="regPass" type="password" placeholder="Password">
    <button onclick="register()">Simpan</button>
  </div>
</div>

<!-- LOGIN -->
<div id="loginPopup" class="popup hidden">
  <div class="popup-content">
    <h3>Login</h3>
    <input id="loginUser" placeholder="Username">
    <input id="loginPass" type="password" placeholder="Password">
    <button onclick="login()">Masuk</button>
  </div>
</div>

<script>
const API_URL = "PASTE_URL_WEB_APP_DISINI";
const REDIRECT_URL = "https://sites.google.com";

let dataUser = {avatar:'', jenjang:'', kelas:''};

window.onload = ()=>{
 if(localStorage.getItem('login')==='true'){
   loadDashboard();
 }else{
   document.getElementById('avatarPopup').classList.remove('hidden');
 }
}

function nextJenjang(av){
 dataUser.avatar = av;
 document.getElementById('avatarPopup').classList.add('hidden');
 document.getElementById('jenjangPopup').classList.remove('hidden');
}

function nextKelas(j){
 dataUser.jenjang = j;
 document.getElementById('jenjangPopup').classList.add('hidden');
 let list = document.getElementById('kelasList'); list.innerHTML='';
 let kelas = j==='PAUD' ? ['A','B'] : [1,2,3,4,5,6];

 kelas.forEach(k=>{
  let btn=document.createElement('button');
  btn.innerText=k;
  btn.onclick=()=>{
    dataUser.kelas=k;
    document.getElementById('kelasPopup').classList.add('hidden');
    document.getElementById('registerForm').classList.remove('hidden');
  };
  list.appendChild(btn);
 });
 document.getElementById('kelasPopup').classList.remove('hidden');
}

async function register(){
 let u=document.getElementById('regUser').value;
 let p=document.getElementById('regPass').value;

 let res = await fetch(API_URL,{method:'POST',body:JSON.stringify({action:'register',user:u,pass:p,avatar:dataUser.avatar,jenjang:dataUser.jenjang,kelas:dataUser.kelas})});
 await res.json();
 alert('Akun berhasil, silakan login');
 location.reload();
}

function showLogin(){
 document.getElementById('loginPopup').classList.remove('hidden');
}

async function login(){
 let u=document.getElementById('loginUser').value;
 let p=document.getElementById('loginPass').value;

 let res = await fetch(API_URL,{method:'POST',body:JSON.stringify({action:'login',user:u,pass:p})});
 let data = await res.json();

 if(data.status==='success'){
  localStorage.setItem('login','true');
  localStorage.setItem('user',u);
  loadDashboard();
 }else{
  alert('Login gagal');
 }
}

async function loadDashboard(){
 document.getElementById('home').style.display='none';
 document.getElementById('dashboard').style.display='block';

 let user = localStorage.getItem('user');

 let res = await fetch(API_URL,{method:'POST',body:JSON.stringify({action:'getUser',user:user})});
 let data = await res.json();

 document.getElementById('userName').innerText = user;
 document.getElementById('userInfo').innerText = data.jenjang + ' - Kelas ' + data.kelas;
 document.getElementById('userAvatar').src = 'avatar/' + data.avatar;
}

function goSite(){
 window.location.href = REDIRECT_URL;
}

function logout(){
 localStorage.clear();
 location.reload();
}
</script>

</body>
</html>
