<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal Belajar</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{font-family:'Poppins',sans-serif;margin:0;background:linear-gradient(135deg,#4facfe,#00f2fe)}
.container{text-align:center;padding:30px 15px;color:white}
.logo{width:140px}

button{padding:14px;margin:10px auto;border:none;border-radius:15px;width:90%;display:block;font-weight:600}
button.default{background:#fff;color:#3498db}
button.save{background:#2ecc71;color:white}

input{width:90%;padding:14px;margin:10px auto;border-radius:15px;border:none}

.popup{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);display:flex;justify-content:center;align-items:center}
.popup-content{background:white;padding:25px;border-radius:20px;width:90%;max-width:400px;text-align:center}
.hidden{display:none}

.dashboard{display:none;text-align:center;padding:20px;color:white}
.avatar-img{width:100px;height:100px;border-radius:50%;border:4px solid white}
.card{background:white;color:#333;padding:15px;margin:15px;border-radius:15px}

.login-page{display:none;text-align:center;padding:40px;color:white}

/* tambahan kelas 4 */
.kelas-img{width:260px;display:block;margin:30px auto}
.btn-go{
  margin-top:10px;
  padding:15px;
  width:150px;
  border:none;
  border-radius:12px;
  background:#006400;
  color:white;
  font-weight:bold;
}
</style>
</head>

<body>

<!-- DASHBOARD -->
<div id="dashboard" class="dashboard">
  <img id="userAvatar" class="avatar-img">
  <h2 id="userName"></h2>
  <p id="userInfo"></p>

  <div class="card">
    <button class="default" onclick="logout()">Logout</button>
  </div>

  <!-- AREA TAMBAHAN -->
  <div id="kelasArea"></div>
</div>

<!-- HOME -->
<div id="home" class="container">
  <img src="SiTeek.png" class="logo">
  <h2>Portal Belajar</h2>
  <button class="default" onclick="showLoginPage()">Login</button>
</div>

<!-- LOGIN FULL PAGE -->
<div id="loginPage" class="login-page">
  <h2>Login</h2>
  <input id="loginUser" placeholder="Username">
  <input id="loginPass" type="password" placeholder="Password">
  <button class="default" onclick="login()">Masuk</button>
</div>

<!-- POPUP REGISTER -->
<div id="registerPopup" class="popup hidden">
<div class="popup-content">
<h3>Buat Akun</h3>
<input id="regUser" placeholder="Username">
<input id="regPass" type="password">
<button onclick="register()">Simpan</button>
</div>
</div>

<script>
const API_URL="https://script.google.com/macros/s/AKfycbzLtnh1t_KgrNO9CABPGQv5D67LhR4joPD2BnHXr4EoyVL6cnZgiWnI99NN1h8lnQ-Yuw/exec";
const BASE_AVATAR="https://sugeng1104.github.io/portalbelajarranu1/";

// ================= CEK USER =================
window.onload=()=>{
  const urlParams = new URLSearchParams(window.location.search);
  const user = urlParams.get('user');

  if(user){
    loadDashboard(user);
  }else{
    document.getElementById('home').style.display='block';
  }
}

// ================= LOGIN PAGE =================
function showLoginPage(){
 document.getElementById('home').style.display='none';
 document.getElementById('loginPage').style.display='block';
}

// ================= LOGIN =================
async function login(){
 let u=document.getElementById('loginUser').value;
 let p=document.getElementById('loginPass').value;

 let formData=new FormData();
 formData.append("action","login");
 formData.append("user",u);
 formData.append("pass",p);

 let res=await fetch(API_URL,{method:'POST',body:formData});
 let data=await res.json();

 if(data.status==='success'){
   window.location.href="?user="+u;
 }else{
   alert("Login gagal");
 }
}

// ================= DASHBOARD =================
async function loadDashboard(user){
 document.getElementById('home').style.display='none';
 document.getElementById('loginPage').style.display='none';
 document.getElementById('dashboard').style.display='block';

 let formData=new FormData();
 formData.append("action","getUser");
 formData.append("user",user);

 let res=await fetch(API_URL,{method:'POST',body:formData});
 let data=await res.json();

 document.getElementById('userName').innerText=user;
 document.getElementById('userInfo').innerText=data.jenjang+" - Kelas "+data.kelas;
 document.getElementById('userAvatar').src=BASE_AVATAR+data.avatar;

 // 🔥 KHUSUS KELAS 4
 if(data.kelas == 4){
   document.getElementById('kelasArea').innerHTML = `
     <img src="https://i.imgur.com/your-image.png" class="kelas-img">
     <button class="btn-go" onclick="goKelas4()">GO</button>
   `;
 }
}

// ================= GO KELAS 4 =================
function goKelas4(){
 window.location.href="https://sites.google.com/guru.sd.belajar.id/kelas-4-upt-sdn-ranuklindungan/halaman-muka";
}

// ================= LOGOUT =================
function logout(){
 window.location.href="index.html";
}
</script>

</body>
</html>
