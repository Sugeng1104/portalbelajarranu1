<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal Belajar</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{font-family:'Poppins',sans-serif;margin:0;background:linear-gradient(135deg,#4facfe,#00f2fe)}
.container{text-align:center;padding:30px 15px;color:white}
.logo{width:140px}

button{padding:14px;margin:10px auto;border:none;border-radius:15px;width:90%;display:block;font-weight:600}
button.default{background:#fff;color:#3498db}

input{width:90%;padding:14px;margin:10px auto;border-radius:15px;border:none}

/* LOGIN PAGE */
.login-page{display:none;text-align:center;padding:40px;color:white}

/* DASHBOARD */
.dashboard{display:none;text-align:center;color:white;position:relative}

/* TOP BAR */
.top-bar{
 position:absolute;
 top:10px;
 right:10px;
 display:flex;
 align-items:center;
 gap:10px;
}

.avatar-top{
 width:40px;
 height:40px;
 border-radius:50%;
 border:2px solid white;
}

.logout-btn{
 background:red;
 color:white;
 border:none;
 padding:8px 12px;
 border-radius:10px;
}

/* KELAS */
.kelas-img{
 width:260px;
 display:block;
 margin:120px auto 20px;
}

.btn-go{
 background:#006400;
 color:white;
 padding:12px 20px;
 border:none;
 border-radius:12px;
 display:block;
 margin:auto;
}
</style>
</head>

<body>

<!-- DASHBOARD -->
<div id="dashboard" class="dashboard">

  <div class="top-bar">
    <img id="userAvatar" class="avatar-top">
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>

  <div id="kelasContent"></div>

</div>

<!-- HOME -->
<div id="home" class="container">
  <img src="SiTeek.png" class="logo">
  <h2>Portal Belajar</h2>
  <button class="default" onclick="showLoginPage()">Login</button>
</div>

<!-- LOGIN FULL -->
<div id="loginPage" class="login-page">
  <h2>Login</h2>
  <input id="loginUser" placeholder="Username">
  <input id="loginPass" type="password" placeholder="Password">
  <button class="default" onclick="login()">Masuk</button>
</div>

<script>
const API_URL="https://script.google.com/macros/s/AKfycbzLtnh1t_KgrNO9CABPGQv5D67LhR4joPD2BnHXr4EoyVL6cnZgiWnI99NN1h8lnQ-Yuw/exec";
const BASE_AVATAR="https://sugeng1104.github.io/portalbelajarranu1/";

// ================= CEK URL =================
window.onload=()=>{
  const urlParams = new URLSearchParams(window.location.search);
  const user = urlParams.get('user');

  if(user){
    loadDashboard(user);
  }else{
    document.getElementById('home').style.display='block';
  }
}

// ================= LOGIN PAGE =================
function showLoginPage(){
 document.getElementById('home').style.display='none';
 document.getElementById('loginPage').style.display='block';
}

// ================= LOGIN =================
async function login(){
 let u=document.getElementById('loginUser').value;
 let p=document.getElementById('loginPass').value;

 let formData=new FormData();
 formData.append("action","login");
 formData.append("user",u);
 formData.append("pass",p);

 let res=await fetch(API_URL,{method:'POST',body:formData});
 let data=await res.json();

 if(data.status==='success'){
   window.location.href="?user="+u;
 }else{
   alert("Login gagal");
 }
}

// ================= DASHBOARD =================
async function loadDashboard(user){
 document.getElementById('home').style.display='none';
 document.getElementById('loginPage').style.display='none';
 document.getElementById('dashboard').style.display='block';

 let formData=new FormData();
 formData.append("action","getUser");
 formData.append("user",user);

 let res=await fetch(API_URL,{method:'POST',body:formData});
 let data=await res.json();

 document.getElementById('userAvatar').src=BASE_AVATAR+data.avatar;

 let kelasContent = document.getElementById('kelasContent');

 // ================= LOGIC PER KELAS =================
 if(data.kelas == 4){
   kelasContent.innerHTML = `
     <img src="https://sugeng1104.github.io/portalbelajarranu1/kelas4.png" class="kelas-img">
     <button class="btn-go" onclick="goKelas4()">GO</button>
   `;
 }else{
   kelasContent.innerHTML = `<h2>Kelas ${data.kelas}</h2>`;
 }
}

// ================= GO KELAS 4 =================
function goKelas4(){
 window.location.href="https://sites.google.com/guru.sd.belajar.id/kelas-4-upt-sdn-ranuklindungan/halaman-muka";
}

// ================= LOGOUT =================
function logout(){
 window.location.href="index.html";
}
</script>

</body>
</html>
